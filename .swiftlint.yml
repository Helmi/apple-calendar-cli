opt_in_rules:
  - empty_count
  - closure_end_indentation
  - sorted_imports

# Keep CI strict on correctness/style essentials, while deferring large refactors.
disabled_rules:
  - cyclomatic_complexity
  - function_body_length
  - function_parameter_count
  - file_length
  - type_body_length
  - opening_brace
  - inclusive_language

excluded:
  - .build

line_length:
  warning: 120
  ignores_comments: true

type_name:
  min_length: 3

identifier_name:
  min_length: 2
  excluded:
    - id
    - to
    - ok
